<div class="otp-page">
  <div class="otp-card">
    <div class="otp-icon">📧</div>
    <h2>Verify Your Email</h2>
    <p>We sent a 6-digit code to <strong>{{ email }}</strong></p>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Enter OTP Code</label>
        <input type="text" [(ngModel)]="otp" name="otp" placeholder="000000"
               maxlength="6" class="otp-input" autocomplete="one-time-code">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
        {{ loading ? 'Verifying...' : 'Verify Email ✓' }}
      </button>
    </form>

    <div class="resend-area">
      @if(countdown > 0) {
        <p class="countdown">Resend OTP in <strong>{{ countdown }}s</strong></p>
      } @else {
        <button (click)="resend()" [disabled]="resendLoading" class="btn btn-ghost">
          {{ resendLoading ? 'Sending...' : '🔄 Resend OTP' }}
        </button>
      }
    </div>

    <a routerLink="/auth/login" class="back-link">← Back to Login</a>
  </div>
</div>
