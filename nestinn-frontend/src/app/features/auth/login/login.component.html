<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="brand-logo">🏠 NestInn</div>
      <h1>Find your perfect<br/><em>home away from home</em></h1>
      <p>Join thousands of travellers discovering unique stays across India.</p>
      <div class="stats">
        <div class="stat"><strong>50K+</strong><span>Properties</span></div>
        <div class="stat"><strong>200K+</strong><span>Happy Guests</span></div>
        <div class="stat"><strong>4.9★</strong><span>Avg Rating</span></div>
      </div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-sub">Sign in to continue your journey</p>

      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pass-wrap">
            <input [type]="showPass ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
            <button type="button" class="pass-toggle" (click)="showPass=!showPass">{{ showPass ? '🙈' : '👁️' }}</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>
      <div class="auth-links">
        <span>New to NestInn?</span>
        <a routerLink="/auth/register">Create an account →</a>
      </div>
    </div>
  </div>
</div>
