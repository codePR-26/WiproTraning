<div class="page-hero"><div class="container"><h1>My Profile</h1></div></div>
<div class="container-sm" style="padding:40px 0 80px">
  <div class="card" style="padding:32px">
    <div class="profile-top">
      <div class="avatar-lg">{{ auth.currentUser()?.fullName?.charAt(0) | uppercase }}</div>
      <div>
        <h2>{{ auth.currentUser()?.fullName }}</h2>
        <p>{{ auth.currentUser()?.email }}</p>
        <span class="badge badge-teal">{{ auth.currentUser()?.role }}</span>
      </div>
    </div>
    <hr style="border:1px solid var(--gray-200);margin:24px 0">
    <form (ngSubmit)="save()">
      <div class="form-group"><label>Full Name</label><input type="text" [(ngModel)]="form.fullName" name="fullName"></div>
      <div class="form-group"><label>Phone Number</label><input type="tel" [(ngModel)]="form.phone" name="phone"></div>
      <div class="form-group"><label>Email (cannot change)</label><input type="email" [value]="auth.currentUser()?.email" disabled></div>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Save Changes' }}</button>
    </form>
  </div>
</div>
