<div class="chat-page">
  <div class="chat-header">
    <div class="container">
      <h2>💬 Chat</h2>
      @if(booking()) { <p>Booking #{{ bookingId }} · {{ booking()!.propertyTitle }}</p> }
    </div>
  </div>

  <div class="container chat-layout">
    <div class="chat-box">
      <div class="messages">
        @for(m of messages(); track m.messageId) {
          <div class="msg-wrap" [class.mine]="isMine(m)">
            <div class="msg-bubble" [class.mine]="isMine(m)">
              <p>{{ m.content }}</p>
              <small>{{ m.sentAt | date:'shortTime' }}</small>
            </div>
          </div>
        }
        @if(messages().length === 0) {
          <div class="no-msgs">No messages yet. Say hello! 👋</div>
        }
        <div #msgEnd></div>
      </div>
      <div class="chat-input">
        <input type="text" [(ngModel)]="newMsg" placeholder="Type a message..." (keyup.enter)="send()">
        <button class="btn btn-primary" (click)="send()">Send →</button>
      </div>
    </div>
  </div>
</div>
